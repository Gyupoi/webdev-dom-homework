<!DOCTYPE html>
<html>

<head>
  <title>Проект "Комменты"</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <ul class="comments"></ul>
    <div class="add-form">
      <input type="text" class="add-form-name" placeholder="Введите ваше имя" />
      <textarea type="textarea" class="add-form-text" placeholder="Введите ваш коментарий" rows="4"></textarea>
      <div class="add-form-row">
        <button class="add-form-button">Написать</button>
      </div>
    </div>
  </div>
</body>

<script>
  "use strict";
  const addFormNameEl = document.querySelector(".add-form-name");
  const addFormTextEl = document.querySelector(".add-form-text");
  const addFormButtonEl = document.querySelector(".add-form-button");
  const commentsListEl = document.querySelector(".comments");

  const comments = [
    {
      name: "Глеб Фокин",
      date: "12.02.22 12:18",
      text: "Это будет первый комментарий на этой странице",
      likes: 3,
      isLiked: false,
    },
    {
      name: "Варвара Н.",
      date: "13.02.22 19:22",
      text: "Мне нравится как оформлена эта страница! ❤",
      likes: 75,
      isLiked: true,
    }
  ]

  const renderComments = () => {
    const commentsHtml = comments
      .map((comment, index) => {
        return `
         <li class="comment">
          <div class="comment-header">
            <div>${comment.name}</div>
            <div>${comment.date}</div>
          </div>

          <div class="comment-body">
            <div class="comment-text">
              ${comment.text}
            </div>
          </div>

          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">${comment.likes}</span>
              <button
              data-index="${index}" 
              class="like-button ${comment.isLiked ? "-active-like" : ""}"></button>
            </div>
          </div>
        </li>
      `;
      })
      .join("");

    commentsListEl.innerHTML = commentsHtml;

    initLikes();
  }

  const initLikes = () => {
    const likeButtons = document.querySelectorAll(".like-button");

    likeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const index = button.dataset.index;

        const comment = comments[index];

        comment.isLiked = !comment.isLiked;

        if (comment.isLiked) {
          comment.likes++;
        } else {
          comment.likes--;
        }

        renderComments();
      });
    });
  }

  addFormButtonEl.addEventListener("click", () => {
    const name = addFormNameEl.value;
    const text = addFormTextEl.value;

    if (name === "" || text === "") {
      return;
    }

    const now = new Date();
    const formattedDate =
      new Date().toLocaleDateString("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        year: "2-digit"
      }) +
      " " +
      new Date().toLocaleTimeString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit"
      });

    comments.push({
      name: name,
      date: formattedDate,
      text: text,
      likes: 0,
      isLiked: false,
    });

    renderComments();

    addFormNameEl.value = "";
    addFormTextEl.value = "";

  })

  renderComments();



  console.log("It works!");
</script>

</html>
